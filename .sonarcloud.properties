# SonarQube Cloud (Automatic Analysis) configuration.
# Automatic Analysis reads this file (NOT sonar-project.properties).
#
# Exclude vendored / generated / build trees so the dashboard reflects first-party GSM code.
# This also drops the intentional hardcoded Google API keys in owocr (secrets:S6334) — they are
# upstream/vendored and not a concern. If owocr is ever re-included, mark those two findings
# "Won't Fix" in the SonarCloud UI (Issue Exclusions), since Automatic Analysis does not honor
# in-file sonar.issue.ignore.* rules.

sonar.exclusions=\
  GameSentenceMiner/owocr/**,\
  GameSentenceMiner/mecab/**,\
  GSM_Overlay/yomitan/**,\
  texthooker/**,\
  **/node_modules/**,\
  .venv/**,\
  dist/**,\
  build/**,\
  **/*.min.js,\
  **/*.min.css
