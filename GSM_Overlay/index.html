<script>
  let yomitanShowing = false;
  let autoHide = null;
  let hideOnYomitanClose = false;
  // let currentX = 0;
  // let currentY = 0;
  let magpieReleaseInterval = null;
  let magpieController = null;
  let manualModeActivatedOnce = false;
  let shouldShowReadyIndicator = true;

  // ── Magpie coordinate architecture ──────────────────────────────────
  // Magpie is an external window upscaler.  When active, the game's
  // source window occupies a small region while Magpie renders scaled
  // output across the full screen.
  //
  // The Python backend always sends coordinates as source-window-relative
  // monitor percentages (no Magpie mapping).  This frontend handles two
  // coordinate spaces:
  //
  //   • Text rendering  → mapPercentToMagpie() maps source % to Magpie
  //                        destination %, so characters appear on the
  //                        upscaled image.
  //   • Interactive area → stays at the original source-window position
  //                        (with padding) so mouse events forward to the
  //                        game correctly.
  //
  // updateMagpieCompatibility() manages a periodic mouse-release timer
  // that ensures click-through keeps working when Magpie intercepts
  // mouse events.
  // ────────────────────────────────────────────────────────────────────
  let currentMagpieInfo = null;
  let isMagpieActive = false;
  const CJK_LEXICAL_REGEX = /[\p{Script_Extensions=Hiragana}\p{Script_Extensions=Katakana}\p{Script_Extensions=Han}\p{Script_Extensions=Hangul}]/u;
  const LATIN_NUMERIC_REGEX = /[A-Za-z0-9]/;

  function requestMagpieMouseRelease(reason = 'magpie-compat') {
    ipcRenderer.send('set-ignore-mouse-events', true, {
      forward: true,
      forceMagpieRelease: true,
      reason,
    });
  }

  function restoreOverlayPassThrough(reason = 'overlay-pass-through') {
    if (yomitanShowing) {
      return;
    }

    if (magpieController) {
      magpieController.restorePassThrough(reason);
      return;
    }

    if (isMagpieActive) {
      requestMagpieMouseRelease(reason);
    } else {
      ipcRenderer.send('set-ignore-mouse-events', true, { forward: true, reason });
    }
  }

  function normalizeManualModeInactiveBehavior(value) {
    const normalized = String(value || '').trim().toLowerCase();
    return normalized === MANUAL_MODE_INACTIVE_BEHAVIOR_DISABLE_INTERACTION
      ? MANUAL_MODE_INACTIVE_BEHAVIOR_DISABLE_INTERACTION
      : MANUAL_MODE_INACTIVE_BEHAVIOR_HIDE_OVERLAY;
  }

  function shouldHideOverlayWhenManualInactive() {
    return manualModeInactiveBehavior !== MANUAL_MODE_INACTIVE_BEHAVIOR_DISABLE_INTERACTION;
  }

  function isManualInteractionSuppressed() {
    return manualMode && !manualHotkeyPressed;
  }

  function setManualInteractionSuppressed(isSuppressed) {
    document.body.classList.toggle('manual-interaction-suppressed', !!isSuppressed);
  }

  function applyManualInactivePresentation(reason = 'manual-inactive') {
    const isSuppressed = isManualInteractionSuppressed();
    setManualInteractionSuppressed(isSuppressed);

    if (!isSuppressed) {
      return;
    }

    if (shouldHideOverlayWhenManualInactive()) {
      if (!pinned) {
        document.body.classList.remove('force-visible');
      }
      hideTextBoxes();
      restoreOverlayPassThrough(reason);
      return;
    }

    document.body.classList.add('force-visible');
    showTextBoxes();
    restoreOverlayPassThrough(reason);
  }

  /**
   * Maps a monitor-relative percentage coordinate from source-window space
   * to Magpie-destination (scaled) space.  Returns the input unchanged when
   * Magpie is not active.
   *
   * Magpie properties (from Win32 GetPropA) are in physical pixels. The
   * main process now sends explicit physical monitor dimensions so this
   * mapping stays in the same coordinate space as both Magpie and the
   * Windows backend, independent of Chromium DPI behavior.
   *
   * @param {number} pX  X position (0-100 %)
   * @param {number} pY  Y position (0-100 %)
   * @returns {{x: number, y: number}}
   */
  function mapPercentToMagpie(pX, pY) {
    if (magpieController) {
      return magpieController.mapPercent(pX, pY, display);
    }

    if (!isMagpieActive || !currentMagpieInfo) {
      return { x: pX, y: pY };
    }
    const srcL = currentMagpieInfo.sourceWindowLeftEdgePosition;
    const srcT = currentMagpieInfo.sourceWindowTopEdgePosition;
    const srcR = currentMagpieInfo.sourceWindowRightEdgePosition;
    const srcB = currentMagpieInfo.sourceWindowBottomEdgePosition;
    const dstL = currentMagpieInfo.magpieWindowLeftEdgePosition;
    const dstT = currentMagpieInfo.magpieWindowTopEdgePosition;
    const dstR = currentMagpieInfo.magpieWindowRightEdgePosition;
    const dstB = currentMagpieInfo.magpieWindowBottomEdgePosition;
    const srcW = srcR - srcL;
    const srcH = srcB - srcT;
    const dstW = dstR - dstL;
    const dstH = dstB - dstT;
    if (srcW <= 0 || srcH <= 0 || dstW <= 0 || dstH <= 0) {
      return { x: pX, y: pY };
    }
    const physicalDisplaySize = (
      display &&
      display.physicalSize &&
      Number(display.physicalSize.width) > 0 &&
      Number(display.physicalSize.height) > 0
    )
      ? display.physicalSize
      : {
          width: (window.screen.width || window.innerWidth) * (window.devicePixelRatio || 1),

    if (!cacheEntry || cacheEntry.expiresAt <= now) {
      return null;
    }
    return cacheEntry.value;
  }

  function setCachedFuriganaLine(text, value) {
    const key = getFuriganaLineCacheKey(text);
    furiganaLineCache.delete(key);
    furiganaLineCache.set(key, {
      expiresAt: Date.now() + FURIGANA_LINE_CACHE_TTL_MS,
      value,
    });
    pruneFuriganaLineCache();
  }

  applyFuriganaStyleSettings();

  // Loading indicator functions
  let loadingStartTime = null;
  let readyIndicatorFadeTimer = null;
  let readyIndicatorResetTimer = null;

  function showReadyIndicator() {
    const indicator = document.getElementById('loading-indicator');
    if (!indicator) return;

    if (readyIndicatorFadeTimer) {
      clearTimeout(readyIndicatorFadeTimer);
      readyIndicatorFadeTimer = null;
    }
    if (readyIndicatorResetTimer) {
      clearTimeout(readyIndicatorResetTimer);
      readyIndicatorResetTimer = null;
    }

    indicator.classList.remove('show', 'fade-out');
    indicator.style.transition = 'none';
    indicator.style.opacity = '1';
    indicator.innerHTML = '';
    const checkmark = document.createElement('div');
    checkmark.className = 'checkmark';
    checkmark.textContent = "\u2713";
    indicator.appendChild(checkmark);
    indicator.classList.add('show');
    // Force style flush so transition starts reliably even under rapid updates.
    void indicator.offsetHeight;
    indicator.style.transition = 'opacity 1.1s ease-out';
    readyIndicatorFadeTimer = setTimeout(() => {
      indicator.style.opacity = '0';
    }, 550);
    readyIndicatorResetTimer = setTimeout(() => {
      indicator.classList.remove('show', 'fade-out');
      indicator.style.transition = '';
      indicator.style.opacity = '';
      loadingStartTime = null;
      readyIndicatorFadeTimer = null;
      readyIndicatorResetTimer = null;
    }, 1800);
  }

  dragBar.addEventListener("mousedown", (e) => {
    const rect = mainBox.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    isDragging = true;
    document.addEventListener("mousemove", onDrag);
    document.addEventListener("mouseup", stopDrag, { once: true });
  });

  function onDrag(e) {
    if (!isDragging) return;
    const newX = Math.max(0, Math.min(window.innerWidth - mainBox.offsetWidth, e.clientX - dragOffsetX));
    const newY = Math.max(0, Math.min(window.innerHeight - mainBox.offsetHeight, e.clientY - dragOffsetY));
    mainBox.style.left = `${newX}px`;
    mainBox.style.top = `${newY}px`;
  }

  function stopDrag() {
    isDragging = false;
    document.removeEventListener("mousemove", onDrag);
  }

  let prevContainer = null;
  const overlaySocketUrls = { ws1: null, ws2: null };
  let overlayMessageProcessing = false;
  const pendingOverlayMessages = [];

  function setupWebSocket(weburl, isPrimary) {
    try {
      const type = isPrimary ? "ws1" : "ws2";
      overlaySocketUrls[type] = new URL(weburl).toString();
    } catch (e) {
      console.warn("Websocket setup error:", e);
    }
  }

  async function processOverlayMessageQueue() {
    if (overlayMessageProcessing) {
      return;
    }
    overlayMessageProcessing = true;
    try {
      while (pendingOverlayMessages.length > 0) {
        const rawData = pendingOverlayMessages.shift();
        await handleOverlayWebSocketData(rawData);
      }
    } finally {
      overlayMessageProcessing = false;
      if (pendingOverlayMessages.length > 0) {
        processOverlayMessageQueue().catch((err) => {
          console.error("Overlay websocket queue processing failed:", err);
        });
      }
    }
  }

  async function handleOverlayWebSocketData(rawData) {
        let data = rawData;
        try {
          data = JSON.parse(rawData);
        } catch (_) {
          data = rawData;
        }

        if (data.config) {
          ipcRenderer.send("config-received", data.config);
        }

        // Handle window state events
        if (data.type === "window_state") {
          console.log("Window state event received:", data.data, "for game:", data.game);
          
          // Process magpie_info from websocket
          if (data.magpie_info !== undefined) {
            const result = applyMagpieInfo(data.magpie_info, "window-state");
            
            console.log("Magpie info updated from websocket:", currentMagpieInfo);
            console.log("Magpie active state:", isMagpieActive);
            
            if (result.activeChanged || result.signatureChanged) {
              console.log("Magpie state changed:", result.state.signature || "inactive");
            }

            if (!magpieController && (result.activeChanged || result.signatureChanged)) {
              updateMagpieCompatibility(isMagpieActive);
            }
          }
          
          ipcRenderer.send("window-state-changed", {
            state: data.data,
            game: data.game,
            magpieActive: isMagpieActive,
            magpieInfo: currentMagpieInfo,
            isFullscreen: data.is_fullscreen || false,
            recommendManualMode: data.recommend_manual_mode || false
          });
          return; // Don't process as text display
        }

        // Ignore translation-related messages (handled via IPC)
        if (data.type === "translation-result" || data.type === "translation-error") {
          console.log("Translation message received via websocket (ignoring):", data.type);
          return; // Don't process as text display
        }

        if (data.type === "sentence_recycled_status") {
          setPendingSentenceRecycledState(data.line_id, data.is_sentence_recycled);
          if (typeof data.sentence === 'string') {
            document.getElementById("text").textContent = data.sentence[0] == '\n' ? data.sentence.slice(1) : data.sentence;
            ipcRenderer.send("text-received", data.sentence);
          } else if (typeof data.sentence === 'number' || typeof data.sentence === 'boolean') {
            document.getElementById("text").textContent = String(data.sentence);
            ipcRenderer.send("text-received", String(data.sentence));
          }
          setImmediateSentenceRecycled(data.is_sentence_recycled);
          return;
        }

        // Clear existing text boxes
        const mainBoxBounds = mainBox.getBoundingClientRect();

        console.log(data);

        let renderedTextPayload = false;

        // Check if data has words array (new word-level coordinate format)
        if (data.type == "word_coordinates" && Array.isArray(data.data) && data.data.every(item => item.text && item.bounding_rect)) {
          renderedTextPayload = true;
          const isSentenceRecycled = resolvePendingSentenceRecycledState(data.line_id, data.is_sentence_recycled);
          setImmediateSentenceRecycled(isSentenceRecycled);
          // Handle array of {text, bounding_rect}
          ipcRenderer.send("text-received", data);

          clearTextBoxes({ preserveFurigana: true });
          const renderGeneration = ++overlayRenderGeneration;
          
          // FIRST PASS: Detect blocks by "general area" (y-first with soft x guards)
          const {
            lineBlocks,
            blockBoundaries,
            blockCount: currentBlockId,
          } = detectTextBlocks(data.data);
          
          console.log("Detected text blocks:", Array.from(blockBoundaries.entries()).map(([blockId, boundaries]) => ({
            blockId,
            start: boundaries.start,
            end: boundaries.end,
          })));
          
          // Log the complete text of each block
          blockBoundaries.forEach((_, blockId) => {
            let blockText = '';
            for (let i = 0; i < data.data.length; i++) {
              if (lineBlocks.get(i) === blockId) {
                blockText += data.data[i].text;
              }
            }
            console.log(`Block ${blockId} text:`, blockText);
          });
          
          // SECOND PASS: Process lines with block awareness
          const blockContainers = new Map(); // Map from block ID to container div
          const blockIndicatorBounds = new Map();
          
          for (let lineIdx = 0; lineIdx < data.data.length; lineIdx++) {
            const line = data.data[lineIdx];
            console.log("Processing line:", line);
            
            // Check if this is the start or end of a block
            const blockId = lineBlocks.get(lineIdx);
            const boundaries = blockBoundaries.get(blockId) || { start: lineIdx, end: lineIdx };
            const isBlockStart = lineIdx === boundaries.start;
            const isBlockEnd = lineIdx === boundaries.end;
            
            // Create a container paragraph for this block if it's the start
            if (isBlockStart) {
              const blockContainer = document.createElement('p');
              blockContainer.className = 'text-block-container';
              blockContainer.setAttribute('data-block-id', blockId);
              blockContainer.setAttribute('data-line-start', boundaries.start);
              blockContainer.setAttribute('data-line-end', boundaries.end);
              blockContainer.style.position = 'absolute';
              blockContainer.style.pointerEvents = 'none';
              blockContainer.style.left = '0';
              blockContainer.style.top = '0';
              blockContainer.style.width = '100%';
              blockContainer.style.height = '100%';
              blockContainer.style.margin = '0';
              blockContainer.style.padding = '0';
              document.body.appendChild(blockContainer);
              blockContainers.set(blockId, blockContainer);
            }
            
            // Add line break after block ends (create a text node with newline for Yomitan)
            if (isBlockEnd && blockId < currentBlockId - 1) {
              const lineBreak = document.createTextNode('\n');
              const breakSpan = document.createElement('span');
              breakSpan.className = 'block-separator';
              breakSpan.style.position = 'absolute';
              breakSpan.style.pointerEvents = 'none';
              breakSpan.appendChild(lineBreak);
              document.body.appendChild(breakSpan);
            }
            
            const rect = line.bounding_rect;
            let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
            // Track original (source-window) bounds separately for interactive area
            let origMinx = Infinity, origMiny = Infinity, origMaxx = -Infinity, origMaxy = -Infinity;
            let bigInteractiveArea = document.createElement("div");
            bigInteractiveArea.className = "big-interactive-area interactive half-interactive";
            const wordList = [];
            const useLexicalWordBoxes = shouldPreserveLexicalWordBoxes(line.text);

            if (useLexicalWordBoxes) {
              wordList.push(...buildLexicalWordRenderUnits(line.words, line.text, !isBlockEnd));
            } else {
              // Flatten CJK tokens into single characters so Yomitan can anchor each glyph precisely.
              if (isBlockStart && blockId > 0 && Array.isArray(line.words) && line.words[0]?.bounding_rect) {
                wordList.push({
                  text: '\n',
                  bounding_rect: {
                    x1: line.words[0].bounding_rect.x1,
                    y1: line.words[0].bounding_rect.y1,
                    x3: line.words[0].bounding_rect.x1,
                    y3: line.words[0].bounding_rect.y3
                  }
                });
              }

              for (const w of Array.isArray(line.words) ? line.words : []) {
                if (!w || typeof w.text !== 'string' || !w.text.length || !w.bounding_rect) {
                  continue;
                }
                const glyphs = Array.from(w.text);
                const len = glyphs.length;
                if (len <= 1) {
                  wordList.push(w);
                  continue;
                }
                const charWidth = (w.bounding_rect.x3 - w.bounding_rect.x1) / len;
                for (let k = 0; k < len; k++) {
                  wordList.push({
                    text: glyphs[k],
                    bounding_rect: {
                      x1: w.bounding_rect.x1 + (k * charWidth),
                      y1: w.bounding_rect.y1,
                      x3: w.bounding_rect.x1 + ((k + 1) * charWidth),
                      y3: w.bounding_rect.y3
                    }
                  });
                }
              }

              if (isBlockEnd && Array.isArray(line.words) && line.words.length > 0) {
                const lastWord = line.words[line.words.length - 1];
                if (lastWord?.bounding_rect) {
                  wordList.push({
                    text: '\n',
                    bounding_rect: {
                      x1: lastWord.bounding_rect.x3,
                      y1: lastWord.bounding_rect.y1,
                      x3: lastWord.bounding_rect.x3,
                      y3: lastWord.bounding_rect.y3
                    }
                  });
                }
              }
            }

            const lineWordBoxes = [];

            // Iterate over 'wordList'
            for (let wordIndex = 0; wordIndex < wordList.length; wordIndex++) {
              const word = wordList[wordIndex];
              const rect = word.bounding_rect;
              // Original (source-window) coordinates in percentage
              const origX1 = rect.x1 * 100;
              const origY1 = rect.y1 * 100;
              const origX3 = rect.x3 * 100;
              const origY3 = rect.y3 * 100;

              // Track original bounds for interactive area (always source position)
              origMinx = Math.min(origMinx, origX1);
              origMiny = Math.min(origMiny, origY1);
              origMaxx = Math.max(origMaxx, origX3);
              origMaxy = Math.max(origMaxy, origY3);

              // Map to Magpie-scaled position for rendering (identity when Magpie inactive)
              const tl = mapPercentToMagpie(origX1, origY1);
              const br = mapPercentToMagpie(origX3, origY3);
              let x1 = tl.x, y1 = tl.y, x3 = br.x, y3 = br.y;

              // Track rendered (possibly scaled) bounds for line indicators
              minx = Math.min(minx, x1);
              miny = Math.min(miny, y1);
              maxx = Math.max(maxx, x3);
              maxy = Math.max(maxy, y3);
              const box = createTextBox(word.text, x1, y1, x3, y3, 0, true, true, false);
              box.dataset.lineIndex = lineIdx;
              const blockContainer = blockContainers.get(blockId);
              if (blockContainer) {
                blockContainer.appendChild(box);
              } else {
                document.body.appendChild(box);
              }

              const boundBox = box.getBoundingClientRect();
              const hiddenByMainBox = pinned && isTextInMainBox(boundBox, mainBoxBounds);
              if (hiddenByMainBox) {
                console.log("Text inside main box, hiding:", word.text);
                box.style.display = 'none';
              }

              lineWordBoxes.push({
                box,
                text: word.text,
                widthPercent: x3 - x1,
                heightPercent: y3 - y1,
                y1,
                y3,
                boundBox,
                hiddenByMainBox,
              });
            }

            for (const lineWordBox of lineWordBoxes) {
              if (lineWordBox.hiddenByMainBox) {
                continue;
              }
              const fontSize = estimateFontSize(
                lineWordBox.text,
                lineWordBox.widthPercent,
                lineWordBox.heightPercent,
                lineWordBox.boundBox
              );
              lineWordBox.estimatedFontSize = fontSize;
              lineWordBox.box.style.fontSize = `${fontSize}px`;
            }

            const surroundingBoxes = lineWordBoxes.filter((lineWordBox) => (
              !lineWordBox.hiddenByMainBox
              && !isContextSizedPunctuationMarker(lineWordBox.text)
              && Number.isFinite(lineWordBox.estimatedFontSize)
              && lineWordBox.estimatedFontSize > 0
            ));
            const visibleBoxes = lineWordBoxes.filter((lineWordBox) => (
              !lineWordBox.hiddenByMainBox
              && Number.isFinite(lineWordBox.estimatedFontSize)
              && lineWordBox.estimatedFontSize > 0
            ));
            const fontReferenceBoxes = surroundingBoxes.length > 0 ? surroundingBoxes : visibleBoxes;
            const surroundingFontSize = getMedianValue(fontReferenceBoxes.map((lineWordBox) => lineWordBox.estimatedFontSize));
            const surroundingHeightPercent = getMedianValue(fontReferenceBoxes.map((lineWordBox) => lineWordBox.heightPercent));

            if (surroundingFontSize > 0) {
              for (const lineWordBox of lineWordBoxes) {
                if (lineWordBox.hiddenByMainBox || !isContextSizedPunctuationMarker(lineWordBox.text)) {
                  continue;
                }
                lineWordBox.box.style.fontSize = `${Math.round(surroundingFontSize)}px`;

                if (surroundingHeightPercent > 0 && surroundingHeightPercent > lineWordBox.heightPercent * 1.1) {
                  const centerY = (lineWordBox.y1 + lineWordBox.y3) / 2;
                  const newY1 = Math.max(0, Math.min(100 - surroundingHeightPercent, centerY - (surroundingHeightPercent / 2)));
                  lineWordBox.box.style.top = `${newY1 + offsetY}%`;
                  lineWordBox.box.style.height = `${surroundingHeightPercent}%`;
                }
              }
            }

            // Line indicator bounds use the rendered (possibly Magpie-scaled) coordinates
            // so they visually surround the text boxes.
            let lineMinx = minx - 0.2;
            let lineMiny = miny - 0.2;
            let lineMaxx = maxx + 0.2;
            let lineMaxy = maxy + 0.2;

            const existingBlockBounds = blockIndicatorBounds.get(blockId);
            if (existingBlockBounds) {
              existingBlockBounds.minx = Math.min(existingBlockBounds.minx, lineMinx);
              existingBlockBounds.miny = Math.min(existingBlockBounds.miny, lineMiny);
              existingBlockBounds.maxx = Math.max(existingBlockBounds.maxx, lineMaxx);
              existingBlockBounds.maxy = Math.max(existingBlockBounds.maxy, lineMaxy);
            } else {
              blockIndicatorBounds.set(blockId, {
                minx: lineMinx,
                miny: lineMiny,
                maxx: lineMaxx,
                maxy: lineMaxy,
              });
            }

            // When Magpie is active, position the interactive area at the
            // original (source-window) location so mouse events forward to
            // the game correctly.  Text boxes are rendered at the scaled
            // Magpie destination and handle Yomitan interaction directly.
            if (isMagpieActive && currentMagpieInfo) {
              const iaPad = 2.0; // percentage points of padding each side
              bigInteractiveArea.style.position = 'absolute';
              bigInteractiveArea.style.left   = `${origMinx - iaPad}%`;
              bigInteractiveArea.style.top    = `${origMiny - iaPad}%`;
              bigInteractiveArea.style.width  = `${(origMaxx - origMinx) + iaPad * 2}%`;
              bigInteractiveArea.style.height = `${(origMaxy - origMiny) + iaPad * 2}%`;
            }

            document.body.appendChild(bigInteractiveArea);
          }

          blockIndicatorBounds.forEach((bounds) => {
            const blockBox = document.createElement("div");
            blockBox.className = "line-box";
            blockBox.style.position = "absolute";
            blockBox.style.pointerEvents = "none";
            blockBox.style.zIndex = "998";
            blockBox.style.left = `${bounds.minx}%`;
            blockBox.style.top = `${bounds.miny}%`;
            blockBox.style.width = `${bounds.maxx - bounds.minx}%`;
            blockBox.style.height = `${bounds.maxy - bounds.miny}%`;
            applyIndicatorBoxStyles(blockBox);
            document.body.appendChild(blockBox);
          });

          // Add recycled sentence indicator if applicable. Anchor it to the
          // final rendered block bounds so it stays beside the visible text,
          // including when Magpie remaps coordinates.
          if (showRecycledIndicator && isSentenceRecycled && blockIndicatorBounds.size > 0) {
            const renderedBlockBounds = Array.from(blockIndicatorBounds.values());
            const lastBlockBounds = renderedBlockBounds[renderedBlockBounds.length - 1];

            if (lastBlockBounds) {
              const indicator = document.createElement('div');
              indicator.className = 'recycled-indicator';
              indicator.innerHTML = '&#x21BB;';
              indicator.style.position = 'absolute';
              indicator.style.pointerEvents = 'none';
              indicator.style.zIndex = '999';
              indicator.style.color = '#FFA500';
              indicator.style.fontSize = '32px';
              indicator.style.fontWeight = 'bold';
              indicator.style.lineHeight = '1';
              indicator.style.textShadow = '0 0 4px rgba(0, 0, 0, 0.8), 0 0 8px rgba(255, 165, 0, 0.6)';
              indicator.style.opacity = '0.85';
              indicator.style.userSelect = 'none';
              indicator.style.left = `${lastBlockBounds.minx}%`;
              indicator.style.top = `${(lastBlockBounds.miny + lastBlockBounds.maxy) / 2}%`;
              indicator.style.transform = 'translate(calc(-100% - 10px), -50%)';

              document.body.appendChild(indicator);
            }
          }
          
          renderFuriganaForFrame(data.data, renderGeneration).catch((err) => {
            console.warn('[Furigana] Async render failed:', err);
          });

        } else {
          const line = data?.sentence ?? data;
          if (typeof line === 'string') {
            renderedTextPayload = true;
            document.getElementById("text").textContent = line[0] == '\n' ? line.slice(1) : line;
            updateImmediateRecycledIndicator();
          } else if (typeof line === 'number' || typeof line === 'boolean') {
            renderedTextPayload = true;
            document.getElementById("text").textContent = String(line);
            updateImmediateRecycledIndicator();
          }
        }

        if (renderedTextPayload && shouldShowReadyIndicator) {
          showReadyIndicator();
        }
        if (manualMode && !manualHotkeyPressed) {
          applyManualInactivePresentation('text-received-manual-inactive');
        }

        ipcRenderer.send("text-received", data);
        if (!manualModeActivatedOnce) {
          setMouseEventHandlers();
        }
  }

  ipcRenderer.on("overlay-websocket-data", (event, payload) => {
    if (!payload || typeof payload.data !== "string") {
      return;
    }
    pendingOverlayMessages.push(payload.data);
    processOverlayMessageQueue().catch((err) => {
      console.error("Overlay websocket message handling failed:", err);
    });
  });

  function createTextBox(sentence, x1, y1, x2, y2, fontSize, noBackground = false, transparentText = false, verticalText = false) {
    const textBox = document.createElement('span');
    textBox.className = 'text-box';
    const text = sentence[0] == '\n' ? sentence.slice(1) : sentence;
    textBox.textContent = text;
    textBox.classList.add('interactive');
    textBox.dataset.selectable = 'true';
    textBox.style.left = `${x1 + offsetX}%`;
    textBox.style.top = `${y1 + offsetY}%`;
    textBox.style.width = `${x2 - x1}%`;
    textBox.style.height = `${y2 - y1}%`;
    textBox.style.display = 'block';
    textBox.style.overflow = 'visible';
    textBox.style.whiteSpace = 'nowrap';
    textBox.style.fontSize = '48px';
    textBox.style.lineHeight = 'normal';
    textBox.style.textOverflow = 'ellipsis';
    textBox.style.background = 'rgba(0,0,0,0)';
    textBox.style.border = 'none';
    if (transparentText) {
      textBox.style.color = 'rgba(255,255,255,0)';
    }

    if (verticalText && /[^\u0000-\u007F]+/.test(sentence)) {
      textBox.style.writingMode = 'vertical-rl';
      textBox.style.textAlign = 'center';
      textBox.style.alignItems = 'flex-start';
      textBox.style.justifyContent = 'center';
      textBox.style.whiteSpace = 'normal';
    } else {
      textBox.style.lineHeight = '1';
      textBox.style.display = 'block';
      textBox.style.overflow = 'visible';
      textBox.style.whiteSpace = 'nowrap';
    }
    return textBox;
  }

  function createNavigationBox(sentence, x1, y1, x2, y2) {
    const textBox = document.createElement('span');
    textBox.className = 'nav-char-box';
    textBox.textContent = sentence;
    textBox.dataset.selectable = 'true';
    textBox.style.left = `${x1 + offsetX}%`;
    textBox.style.top = `${y1 + offsetY}%`;
    textBox.style.width = `${x2 - x1}%`;
    textBox.style.height = `${y2 - y1}%`;
    textBox.style.fontSize = '48px';
    return textBox;
  }

  function shouldPreserveLexicalWordBoxes(lineText) {
    return !CJK_LEXICAL_REGEX.test(String(lineText || ''));
  }

  function normalizeLexicalFragmentText(text) {
    return String(text || '').replace(/\s+/g, '');
  }

  function buildLexicalWordRenderUnits(words, lineText, appendTrailingSpace = false) {
    const normalizedWords = Array.isArray(words)
      ? words.filter((word) => (
          word
          && typeof word.text === 'string'
          && word.text.length > 0
          && word.bounding_rect
        ))
      : [];
    const multiCharWordCount = normalizedWords.filter((word) => (
      normalizeLexicalFragmentText(word.text).length > 1
    )).length;

    // Trust OCR word segmentation when it already produced actual lexical words.
    if (normalizedWords.length <= 1 || multiCharWordCount > 0) {
      return finalizeLexicalWordRenderUnits(normalizedWords, appendTrailingSpace, true);
    }

    const normalizedLineText = normalizeLexicalFragmentText(lineText);
    if (normalizedWords.length > 1 && normalizedLineText.length > 0) {
      return finalizeLexicalWordRenderUnits([{
        text: String(lineText || ''),
        bounding_rect: {
          x1: normalizedWords[0].bounding_rect.x1,
          y1: Math.min(...normalizedWords.map((word) => word.bounding_rect.y1)),
          x3: normalizedWords[normalizedWords.length - 1].bounding_rect.x3,
          y3: Math.max(...normalizedWords.map((word) => word.bounding_rect.y3)),
        }
      }], appendTrailingSpace, false);
    }

    return finalizeLexicalWordRenderUnits(normalizedWords, appendTrailingSpace, false);
  }

  function finalizeLexicalWordRenderUnits(words, appendTrailingSpace = false, trustProvidedText = false) {
    const units = [];

    words.forEach((word, wordIndex) => {
      const rect = word.bounding_rect;
      const baseText = String(word.text || '');
      const glyphs = Array.from(baseText);
      const glyphCount = Math.max(1, glyphs.length);
      const charWidth = Math.max(0.0001, (rect.x3 - rect.x1) / glyphCount);
      const nextWord = words[wordIndex + 1];
      const shouldAppendSpace = !!nextWord || appendTrailingSpace;
      let x3 = rect.x3;
      let text = baseText;

      if (trustProvidedText && /\s$/u.test(baseText)) {
        // OCR already included the trailing space in both text and bounds.
      } else if (shouldAppendSpace) {
        const rawSpaceWidth = nextWord && nextWord.bounding_rect
          ? Math.max(0, nextWord.bounding_rect.x1 - rect.x3)
          : charWidth * 0.45;
        const spaceWidth = Math.max(charWidth * 0.2, rawSpaceWidth);
        const spaceX3 = Math.min(1, rect.x3 + spaceWidth);
        x3 = spaceX3 > rect.x3 ? spaceX3 : Math.min(1, rect.x3 + (charWidth * 0.2));
        text += ' ';
      }

      units.push({
        text,
        bounding_rect: {
          x1: rect.x1,
          y1: rect.y1,
          x3,
          y3: rect.y3,
        }
      });
    });

    return units;
  }

  function getViewportRectFromPercentBounds(x1, y1, x3, y3) {
    const left = ((x1 + offsetX) / 100) * window.innerWidth;
    const top = ((y1 + offsetY) / 100) * window.innerHeight;
    const right = ((x3 + offsetX) / 100) * window.innerWidth;
    const bottom = ((y3 + offsetY) / 100) * window.innerHeight;
    return {
      left,
      top,
      right,
      bottom,
      width: right - left,
      height: bottom - top,
    };
  }

  function estimateFontSize(word, widthPercent, heightPercent, rect) {
    if (rect && Number.isFinite(rect.height) && rect.height > 0) {
      return Math.max(8, Math.min(100, Math.round(rect.height)));
    }
    const pixelHeight = (heightPercent / 100) * window.innerHeight;
    return Math.max(8, Math.min(100, Math.round(pixelHeight)));
  }

  function isContextSizedPunctuationMarker(text) {
    if (typeof text !== 'string') {
      return false;
    }
    const compact = text.replace(/\s+/g, '');
    if (!compact || compact === '\n') {
      return false;
    }
    // Dash-like punctuation markers should inherit surrounding text sizing.
    if (/^[\-‐‑‒–—―ーｰ－〜～]+$/.test(compact)) {
      return true;
    }
    // Lexical characters keep OCR sizing.
    if (LATIN_NUMERIC_REGEX.test(compact) || CJK_LEXICAL_REGEX.test(compact)) {
      return false;
    }
    // Visible punctuation/symbol-like markers inherit surrounding text sizing.
    return true;
  }

  function buildLineCharacterBoxes(line) {
    const characters = [];
    if (!line || !Array.isArray(line.words)) {
      return characters;
    }

    for (const word of line.words) {
      if (!word || typeof word.text !== 'string' || !word.bounding_rect) {
        continue;
      }

      const text = word.text;
      if (!text.length) {
        continue;
      }

      const rect = word.bounding_rect;
      const charWidth = (rect.x3 - rect.x1) / Math.max(1, text.length);

      for (let i = 0; i < text.length; i++) {
        const origX1 = (rect.x1 + (i * charWidth)) * 100;
        const origY1 = rect.y1 * 100;
        const origX3 = (rect.x1 + ((i + 1) * charWidth)) * 100;
        const origY3 = rect.y3 * 100;
        const topLeft = mapPercentToMagpie(origX1, origY1);
        const bottomRight = mapPercentToMagpie(origX3, origY3);

        characters.push({
          text: text[i],
          x1: topLeft.x,
          y1: topLeft.y,
          x3: bottomRight.x,
          y3: bottomRight.y,
        });
      }
    }

    return characters;
  }

  function getFuriganaAnnotationsForLine(line, segments) {
    const lineText = line && typeof line.text === 'string' ? line.text : '';
    const normalizedSegments = (FuriganaUtils && typeof FuriganaUtils.normalizeBackendSegments === 'function')
      ? FuriganaUtils.normalizeBackendSegments(lineText, segments || [], { source: 'overlay-renderer' })
      : (Array.isArray(segments) ? segments : []);

    const annotations = [];
    const seen = new Set();

    normalizedSegments.forEach((segment) => {
      if (!segment) {
        return;
      }

      const segmentAnnotations = Array.isArray(segment.annotations) && segment.annotations.length > 0
        ? segment.annotations
        : ((segment.hasReading && segment.reading)
          ? [{
              start: segment.start,
              end: segment.end,
              text: segment.text,
              reading: segment.reading,
            }]
          : []);

      segmentAnnotations.forEach((annotation) => {
        if (!annotation || !annotation.reading) {
          return;
        }
        const start = Number(annotation.start);
        const end = Number(annotation.end);
        if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end <= start) {
          return;
        }

        const key = `${start}:${end}:${annotation.reading}`;
        if (seen.has(key)) {
          return;
        }
        seen.add(key);

        annotations.push({
          start,
          end,
          text: annotation.text || lineText.slice(start, end),
          reading: annotation.reading,
        });
      });
    });

    annotations.sort((a, b) => (a.start === b.start ? a.end - b.end : a.start - b.start));
    return annotations;
  }

  function createFuriganaBoxesForLine(line, segments) {
    const boxes = [];
    const characters = buildLineCharacterBoxes(line);
    if (characters.length === 0) {
      return boxes;
    }

    const annotations = getFuriganaAnnotationsForLine(line, segments);
    for (const annotation of annotations) {
      const start = Number(annotation.start);
      const end = Number(annotation.end);
      const reading = String(annotation.reading || '').trim();
      if (!reading) {
        continue;
      }

      const annotationChars = characters.slice(start, end).filter(Boolean);
      if (annotationChars.length === 0) {
        continue;
      }

      const startChar = annotationChars[0];
      const endChar = annotationChars[annotationChars.length - 1];
      const minTop = Math.min(...annotationChars.map((char) => char.y1));
      const maxHeightPercent = Math.max(...annotationChars.map((char) => Math.max(0, char.y3 - char.y1)));
      const baseFontSize = Math.max(8, Math.min(100, Math.round((maxHeightPercent / 100) * window.innerHeight)));
      const segmentWidth = Math.max(0.35, endChar.x3 - startChar.x1);

      const left = startChar.x1 + offsetX;
      const top = minTop + offsetY;
      const furiganaBox = document.createElement('div');
      furiganaBox.className = 'furigana-box';
      furiganaBox.style.left = `${left}%`;
      furiganaBox.style.top = `${top}%`;
      furiganaBox.style.width = `${segmentWidth}%`;
      furiganaBox.style.setProperty('--gsm-furigana-base-font-size', `${baseFontSize}px`);
      furiganaBox._gsmRenderSignature = [
        roundFuriganaSignatureValue(left),
        roundFuriganaSignatureValue(top),
        roundFuriganaSignatureValue(segmentWidth),
        String(Math.round(baseFontSize)),
        reading,
      ].join('|');

      const furiganaText = document.createElement('span');
      furiganaText.className = 'furigana-reading';
      furiganaText.textContent = reading;
      furiganaBox.appendChild(furiganaText);

      boxes.push(furiganaBox);
    }

    return boxes;
  }

  async function renderFuriganaForFrame(lines, renderGeneration) {
    if (showFurigana && !gamepadHandler && typeof syncGamepadHandlerLifecycle === 'function') {
      await syncGamepadHandlerLifecycle();
    }

    const furiganaReady = gamepadHandler && (
      typeof gamepadHandler.canRequestFurigana === 'function'
        ? gamepadHandler.canRequestFurigana()
        : gamepadHandler.isServerConnected()
    );
    if (!showFurigana || !furiganaReady) {
      resetFuriganaRenderState();
      return;
    }

    const furiganaRequests = lines.map((line, lineIdx) => {
      if (!line || !line.text || !/[^\u0000-\u007F]/.test(line.text)) {
        return Promise.resolve(null);
      }
      const cachedLine = getCachedFuriganaLine(line.text);
      if (cachedLine) {
        return Promise.resolve({ line, lineIdx, segments: cachedLine.segments || [] });
      }
      return gamepadHandler.requestFurigana(line.text, lineIdx, 1200)
        .then((result) => {
          const normalizedResult = { segments: result.segments || [] };
          setCachedFuriganaLine(line.text, normalizedResult);
          return { line, lineIdx, segments: normalizedResult.segments };
        })
        .catch((err) => {
          console.warn(`[Furigana] Failed to get furigana for line ${lineIdx}:`, err);
          return null;
        });
    });

    const resolved = await Promise.all(furiganaRequests);
    if (renderGeneration !== overlayRenderGeneration) {
      return;
    }

    const fragment = document.createDocumentFragment();
    let renderedCount = 0;
    const renderSignatureParts = [];
    for (const item of resolved) {
      if (!item || !item.segments || item.segments.length === 0) {
        continue;
      }
      const boxes = createFuriganaBoxesForLine(item.line, item.segments);
      for (const box of boxes) {
        fragment.appendChild(box);
        renderedCount++;
        renderSignatureParts.push(box._gsmRenderSignature || '');
      }
    }

    if (renderedCount === 0) {
      resetFuriganaRenderState();
      return;
    }

    const renderSignature = renderSignatureParts.join('||');
    if (renderSignature === lastFuriganaRenderSignature) {
      updateFuriganaVisibilityState();
      return;
    }

    lastFuriganaRenderSignature = renderSignature;
    furiganaAutoHidden = false;
    if (furiganaLayer) {
      furiganaLayer.replaceChildren(fragment);
    }
    updateFuriganaVisibilityState();
    scheduleFuriganaAutoHide();
  }

  function isTextInMainBox(rect, mainBoxBounds) {

    if (mainBox.style.display === "none" || mainBox.style.visibility === "hidden") {

    const bigInteractiveAreas = document.querySelectorAll('.big-interactive-area');

        element.addEventListener('mouseleave', () => {
          isMouseOverInteractiveElement = false;

        case "manualModeType":
          manualModeType = String(value || "hold").trim().toLowerCase() === "toggle" ? "toggle" : "hold";
          break;
        case "manualModeInactiveBehavior":
          manualModeInactiveBehavior = normalizeManualModeInactiveBehavior(value);
          applyManualInactivePresentation('manual-mode-inactive-behavior-updated');
          break;
        case "showHotkey":
          showHotkey = value;
          break;
        case "pinned":
          updatePinnedState(value);
          break;
        case "showTextIndicators":
          updateTextIndicators(value, fadeTextIndicators);
          break;
        case "fadeTextIndicators":
          updateTextIndicators(showTextIndicators, value);
          break;
        case "showTextBackground":
          // Legacy compatibility path.
          updateTextIndicators(value, value);
          break;
        case "showReadyIndicator":
          shouldShowReadyIndicator = value !== false;
          break;
        case "showFurigana":
          showFurigana = value;
          if (!showFurigana) {
            clearFuriganaAutoHideTimer();
            furiganaAutoHidden = false;
          }
          updateFuriganaVisibilityState();
          break;
        case "hideFuriganaOnStartup":
          hideFuriganaOnStartup = value;
          break;
        case "hideFuriganaAfterSeconds":
          hideFuriganaAfterSeconds = clampNumber(value, 0, 0, 60);
          clearFuriganaAutoHideTimer();
          furiganaAutoHidden = false;
          updateFuriganaVisibilityState();
          if (shouldShowFuriganaLayer()) {
            scheduleFuriganaAutoHide();
          }
          break;
        case "furiganaScale":
        case "furiganaYOffset":
        case "furiganaColor":
        case "furiganaFontFamily":
        case "furiganaFontWeight":
        case "furiganaOutlineColor":
        case "furiganaOutlineWidth":
          applyFuriganaStyleSettings({ [key]: value });
          break;
        case "hideYomitanAfterMine":
          hideYomitanAfterMine = value;
          break;
        case "showRecycledIndicator":
          showRecycledIndicator = value;
          updateImmediateRecycledIndicator();
          break;
        case "offsetX":
          offsetX = value;
          break;
        case "offsetY":
          offsetY = value;
          break;
      }
    });
  });

  function updateMagpieCompatibility(newValue) {
    // Manages the periodic mouse-release timer when Magpie is active.
    // Magpie intercepts mouse events, so we periodically release mouse
    // control back to it when the user isn't interacting with Yomitan.
    console.log("Magpie compatibility behavior update - Active:", newValue);

    if (magpieController) {
      magpieController.syncCompatibility('magpie-compatibility');
      const state = magpieController.getState();
      currentMagpieInfo = state.info;
      isMagpieActive = state.active;
      return;
    }

    if (magpieReleaseInterval) {
      clearInterval(magpieReleaseInterval);
      magpieReleaseInterval = null;
    }

    if (newValue) {
      if (!yomitanShowing && !manualHotkeyPressed) {
        requestMagpieMouseRelease('magpie-compat-start');
      }
      magpieReleaseInterval = setInterval(() => {
        if (!yomitanShowing && !manualHotkeyPressed) {
          requestMagpieMouseRelease('magpie-compat-interval');
        }
      }, 1000);
    }
  }

  function updateManualMode(newValue) {
    manualMode = newValue;
    manualModeActivatedOnce = false;
    manualHotkeyPressed = false;
    hideOnYomitanClose = false;

    if (manualMode) {

      restoreOverlayPassThrough('manual-mode-enabled');

  function updatePinnedState(newValue) {

  function updateTextBackground(newValue) {
    updateTextIndicators(newValue, fadeTextIndicators);

  function applyIndicatorBoxStyles(lineBox) {
    if (showTextIndicators) {
      lineBox.style.border = '1px solid rgba(255, 0, 0, 0.6)';

        setTimeout(() => {
          lineBox.style.borderColor = 'rgba(255, 0, 0, 0)';
          lineBox.style.background = 'rgba(0, 0, 0, 0)';
        }, 1000);
      } else {
        lineBox.style.transition = 'none';
      }
    } else {
      lineBox.style.transition = 'none';
      lineBox.style.background = 'rgba(0, 0, 0, 0)';
      lineBox.style.border = 'none';
    }
  }

  function updateTextIndicators(newShowValue, newFadeValue) {
    showTextIndicators = newShowValue !== false;
    fadeTextIndicators = newFadeValue === true;
    const lineBoxes = document.querySelectorAll('.line-box');
    lineBoxes.forEach(lineBox => {
      applyIndicatorBoxStyles(lineBox);
    });

  ipcRenderer.on("new-fontsize", (event, newsize) => {
    textEl.style.fontSize = `${newsize}px`;
  })
  ipcRenderer.on("new-weburl1", (event, newurl) => {

  // Toggle furigana visibility on hotkey

  ipcRenderer.on('toggle-main-box', () => {

    }

  ipcRenderer.on('new-manualmode', (event, newValue) => {
    updateManualMode(newValue);

  // Listen for game state changes to control action panel visibility
  ipcRenderer.on('game-state', (event, state) => {
    /*
    const actionPanelTrigger = document.getElementById('action-panel-trigger');

    if (state === 'active') {

    */

  // Handle manual mode recommendation
  ipcRenderer.on('recommend-manual-mode', (event, { game }) => {
    if (dismissedRecommendationGames.includes(game)) {

      return;

    currentGameForRecommendation = game;

      banner.classList.add('visible');

  // Handle enabling manual mode from recommendation
  document.addEventListener('DOMContentLoaded', () => {
    const enableBtn = document.getElementById('btn-enable-manual');
    const dismissBtn = document.getElementById('btn-dismiss-recommendation');
    const banner = document.getElementById('manual-mode-recommendation');

    if (enableBtn) {
      enableBtn.addEventListener('click', () => {
        // Enable manual mode
        ipcRenderer.send('setting-changed', { key: 'manualMode', value: true });
        // Hide banner
        if (banner) banner.classList.remove('visible');
        // Save dismissed game permanently
        if (currentGameForRecommendation && !dismissedRecommendationGames.includes(currentGameForRecommendation)) {
          dismissedRecommendationGames.push(currentGameForRecommendation);
          ipcRenderer.send('setting-changed', { key: 'dismissedFullscreenRecommendations', value: dismissedRecommendationGames });
        }
      });
    }

    if (dismissBtn) {
      dismissBtn.addEventListener('click', () => {
        // Permanently dismiss for this game
        if (banner) banner.classList.remove('visible');
        if (currentGameForRecommendation && !dismissedRecommendationGames.includes(currentGameForRecommendation)) {
          dismissedRecommendationGames.push(currentGameForRecommendation);
          ipcRenderer.send('setting-changed', { key: 'dismissedFullscreenRecommendations', value: dismissedRecommendationGames });
        }
      });
    }
  });

  // Function to display translation over text boxes
  function showTranslation(translationText) {
    // Remove any existing translation
    const existingTranslation = document.getElementById('translation-display');
    if (existingTranslation) {
      existingTranslation.remove();
    }

    if (!translationText) return;

    // Get all text boxes to calculate their bounding area
    const textBoxes = document.querySelectorAll('.text-box');
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    
    textBoxes.forEach(box => {
      if (box.style.display !== 'none') {
        const rect = box.getBoundingClientRect();
        minX = Math.min(minX, rect.left);
        minY = Math.min(minY, rect.top);
        maxX = Math.max(maxX, rect.right);
        maxY = Math.max(maxY, rect.bottom);
      }
    });

    // Create translation display element
    const translationDiv = document.createElement('div');
    translationDiv.id = 'translation-display';
    translationDiv.style.position = 'absolute';
    
    // Position over the text boxes if they exist, otherwise use a default position
    if (textBoxes.length > 0 && minX !== Infinity) {
      translationDiv.style.left = `${minX}px`;
      translationDiv.style.top = `${minY}px`;
      translationDiv.style.width = `${maxX - minX}px`;
      translationDiv.style.height = `${maxY - minY}px`;
    } else {
      // Fallback to center area if no text boxes
      translationDiv.style.left = '50%';
      translationDiv.style.top = '50%';
      translationDiv.style.transform = 'translate(-50%, -50%)';
    }
    
    translationDiv.style.backgroundColor = 'rgba(0, 0, 0, 0.97)';
    translationDiv.style.color = 'white';
    translationDiv.style.padding = '20px 30px';
    translationDiv.style.borderRadius = '10px';
    translationDiv.style.border = '2px solid rgba(0, 255, 136, 0.5)';
    translationDiv.style.boxShadow = '0 0 20px rgba(0, 255, 136, 0.3)';
    // Set font size based on .text-box font size, or fallback to 24px
    let sampleBox = document.querySelector('.text-box');
    let fontSize = 32;
    if (sampleBox) {
      const computed = window.getComputedStyle(sampleBox);
      fontSize = parseInt(computed.fontSize) - Math.floor(parseInt(computed.fontSize) * 0.2) || 32;
    }
    translationDiv.style.fontSize = fontSize + 'px';
    translationDiv.style.maxWidth = '80%';
    translationDiv.style.textAlign = 'center';
    translationDiv.style.zIndex = '10001';
    translationDiv.style.pointerEvents = 'none';
    translationDiv.style.userSelect = 'none';
    translationDiv.style.whiteSpace = 'pre-wrap';
    translationDiv.style.wordBreak = 'break-word';
    translationDiv.textContent = translationText;
    translationDiv.style.transition = 'opacity 0.3s ease';

    document.body.appendChild(translationDiv);

    // Hide on hover to see text underneath
    const hideOnHover = () => {
      if (translationDiv && translationDiv.parentNode) {
        translationDiv.style.opacity = '0';
      }
    };

    const showOnHoverEnd = () => {
      if (translationDiv && translationDiv.parentNode) {
        translationDiv.style.opacity = '1';
      }
    };

    document.body.addEventListener('mouseenter', hideOnHover);
    document.body.addEventListener('mouseleave', showOnHoverEnd);

    // Auto-remove after 30 seconds
    // setTimeout(() => {
    //   if (translationDiv && translationDiv.parentNode) {
    //     document.body.removeEventListener('mouseenter', hideOnHover);
    //     document.body.removeEventListener('mouseleave', showOnHoverEnd);
    //     translationDiv.remove();
    //   }
    // }, 30000);
  }

</script>

<script src="yomitan_bridge.js"></script>

<script>
  // ==================== Gamepad Integration ====================
  // This provides controller support for navigating text blocks and cursor positions
  // to enable Yomitan lookups without a mouse.
  // 
  // IMPORTANT: This uses a Rust Input Server to handle
  // gamepad input at the OS level, allowing it to work even when another window
  // (like a game) has focus. The browser Gamepad API doesn't work when unfocused.
  
  let gamepadHandler = null;
  let gamepadModuleLoadPromise = null;
  let gamepadInputSuppressed = false;
  let gamepadStatusHideTimeout = null;
  let wasGamepadConnected = false;
  let gamepadSettings = {
    enabled: true,
    serverUrl: 'ws://localhost:7276', // Python gamepad server
    activationMode: 'modifier', // 'modifier' or 'toggle'
    modifierButton: 4, // LB
    toggleButton: 8, // Back/Select
    confirmButton: 0, // A
    cancelButton: 1, // B
    forwardEnterButton: -1, // Disabled
    manualOverlayScanButton: -1, // Disabled
    nextEntryButton: 7, // RT trigger - navigate to next Yomitan entry
    prevEntryButton: 6, // LT trigger - navigate to previous Yomitan entry
    repeatDelay: 400,
    repeatRate: 150,
    autoConfirmSelection: true,
    focusOverlayOnEntry: true, // Focus overlay window when navigation activates
    tokenMode: false, // Navigate by tokenizer word units instead of characters
    tokenizerBackend: 'sudachi', // "mecab", "sudachi", "yomitan-bridge", "yomitan-api", "jiten-api", or "jpdb-api"
    localTokenizerFallbackBackend: 'mecab', // Local retry backend when the selected tokenizer fails
    yomitanApiUrl: 'http://127.0.0.1:19633', // Base URL for Yomitan API
    yomitanScanLength: 10, // scanLength for Yomitan /tokenize
    jitenApiKey: '', // X-Api-Key used for Jiten/api/reader/parse
    jpdbApiKey: '', // Bearer token used for JPDB /api/v1/parse
    controllerEnabled: true, // Enable controller button activation
    keyboardEnabled: true, // Enable keyboard hotkey activation (set from settings)
    inputSuppressed: false, // Temporarily suppress controller processing (settings input test)
    // Keyboard bindings (parallel to gamepad button bindings)
    keyboardModifierKey: null,
    keyboardToggleKey: null,
    keyboardConfirmKey: 'Enter',
    keyboardCancelKey: 'Escape',
    keyboardForwardEnterKey: null,
    keyboardManualOverlayScanKey: null,
    keyboardTokenModeToggleKey: null,
    keyboardNextEntryKey: null,
    keyboardPrevEntryKey: null,
    keyboardNavigateUp: 'ArrowUp',
    keyboardNavigateDown: 'ArrowDown',
    keyboardNavigateLeft: 'ArrowLeft',
    keyboardNavigateRight: 'ArrowRight',
    keyboardMineButton: null,
  };

  // Keyboard setting keys that map directly (settingKey in settings.html -> gamepadSettings key)
  const KEYBOARD_SETTING_KEYS = [
    'keyboardModifierKey', 'keyboardToggleKey', 'keyboardConfirmKey', 'keyboardCancelKey',
    'keyboardForwardEnterKey', 'keyboardManualOverlayScanKey', 'keyboardTokenModeToggleKey',
    'keyboardNextEntryKey', 'keyboardPrevEntryKey',
    'keyboardNavigateUp', 'keyboardNavigateDown', 'keyboardNavigateLeft', 'keyboardNavigateRight',
    'keyboardMineButton',
  ];

  function shouldUseGamepadHandler() {
    return gamepadSettings.enabled || showFurigana;
  }

  function usesServerBackedGamepadTokenizer(backend) {
    const tokenizerBackend = String(backend || 'mecab').toLowerCase();
    return tokenizerBackend === 'mecab' || tokenizerBackend === 'sudachi';
  }

  function shouldConnectGamepadServer() {
    const navigationNeedsServer = gamepadSettings.enabled && gamepadSettings.controllerEnabled;
    const tokenizerNeedsServer = (gamepadSettings.enabled || showFurigana) && (
      usesServerBackedGamepadTokenizer(gamepadSettings.tokenizerBackend) ||
      usesServerBackedGamepadTokenizer(gamepadSettings.localTokenizerFallbackBackend)
    );
    return navigationNeedsServer || tokenizerNeedsServer;
  }

  function getEffectiveControllerEnabled() {
    return gamepadSettings.enabled && gamepadSettings.controllerEnabled;
  }

  function getEffectiveKeyboardEnabled() {
    return gamepadSettings.enabled && gamepadSettings.keyboardEnabled;
  }

  function getGamepadNavigationAvailability() {
    return {
      controller: getEffectiveControllerEnabled(),
      keyboard: getEffectiveKeyboardEnabled(),
    };
  }

  function getGamepadHandlerConfig() {
    return {
      serverUrl: gamepadSettings.serverUrl,
      activationMode: gamepadSettings.activationMode,
      modifierButton: gamepadSettings.modifierButton,
      toggleButton: gamepadSettings.toggleButton,
      confirmButton: gamepadSettings.confirmButton,
      cancelButton: gamepadSettings.cancelButton,
      forwardEnterButton: gamepadSettings.forwardEnterButton,
      manualOverlayScanButton: gamepadSettings.manualOverlayScanButton,
      nextEntryButton: gamepadSettings.nextEntryButton,
      prevEntryButton: gamepadSettings.prevEntryButton,
      repeatDelay: gamepadSettings.repeatDelay,
      repeatRate: gamepadSettings.repeatRate,
      autoConfirmSelection: gamepadSettings.autoConfirmSelection,
      focusOverlayOnEntry: gamepadSettings.focusOverlayOnEntry,
      tokenMode: gamepadSettings.tokenMode,
      tokenizerBackend: gamepadSettings.tokenizerBackend,
      localTokenizerFallbackBackend: gamepadSettings.localTokenizerFallbackBackend,
      yomitanApiUrl: gamepadSettings.yomitanApiUrl,
      yomitanScanLength: gamepadSettings.yomitanScanLength,
      jitenApiKey: gamepadSettings.jitenApiKey,
      jpdbApiKey: gamepadSettings.jpdbApiKey,
      controllerEnabled: getEffectiveControllerEnabled(),
      keyboardEnabled: getEffectiveKeyboardEnabled(),
      connectToServer: shouldConnectGamepadServer(),
      inputSuppressed: gamepadInputSuppressed === true,
      // Keyboard bindings
      keyboardModifierKey: gamepadSettings.keyboardModifierKey,
      keyboardToggleKey: gamepadSettings.keyboardToggleKey,
      keyboardConfirmKey: gamepadSettings.keyboardConfirmKey,
      keyboardCancelKey: gamepadSettings.keyboardCancelKey,
      keyboardForwardEnterKey: gamepadSettings.keyboardForwardEnterKey,
      keyboardManualOverlayScanKey: gamepadSettings.keyboardManualOverlayScanKey,
      keyboardTokenModeToggleKey: gamepadSettings.keyboardTokenModeToggleKey,
      keyboardNextEntryKey: gamepadSettings.keyboardNextEntryKey,
      keyboardPrevEntryKey: gamepadSettings.keyboardPrevEntryKey,
      keyboardNavigateUp: gamepadSettings.keyboardNavigateUp,
      keyboardNavigateDown: gamepadSettings.keyboardNavigateDown,
      keyboardNavigateLeft: gamepadSettings.keyboardNavigateLeft,
      keyboardNavigateRight: gamepadSettings.keyboardNavigateRight,
      keyboardMineButton: gamepadSettings.keyboardMineButton,
    };
  }

  async function ensureGamepadModuleLoaded() {
    if (typeof window.GamepadHandler === 'function') {
      return true;
    }
    if (gamepadModuleLoadPromise) {
      return gamepadModuleLoadPromise;
    }

    gamepadModuleLoadPromise = new Promise((resolve) => {
      const script = document.createElement('script');
      script.src = 'gamepad.js';
      script.onload = () => resolve(typeof window.GamepadHandler === 'function');
      script.onerror = () => resolve(false);
      document.head.appendChild(script);
    });

    return gamepadModuleLoadPromise;
  }
  
  // Initialize gamepad handler
  async function initGamepad() {
    if (!shouldUseGamepadHandler()) {
      if (gamepadHandler) {
        gamepadHandler.destroy();
        gamepadHandler = null;
      }
      window.gamepadHandler = null;
      updateGamepadStatusIndicator();
      return;
    }

    const loaded = await ensureGamepadModuleLoaded();
    if (!loaded || typeof window.GamepadHandler !== 'function') {
      console.error('[Gamepad] Failed to load gamepad module');
      return;
    }

    if (gamepadHandler) {
      gamepadHandler.destroy();
    }
    
    gamepadHandler = new window.GamepadHandler({
      ...getGamepadHandlerConfig(),
      
      // Callbacks
      onBlockChange: (data) => {
        console.log('[Gamepad] Block changed:', data.blockIndex, '/', data.totalBlocks);
        updateGamepadStatusIndicator();
        // Notify main process
        ipcRenderer.send('gamepad-block-change', data.blockIndex);
      },
      
      onCursorChange: (data) => {
        console.log('[Gamepad] Cursor changed:', data.cursorIndex, '/', data.totalCharacters);
        updateGamepadStatusIndicator();
        if (data.character) {
          console.log('[Gamepad] Current character:', data.character.textContent);
        }
      },
      
      onModeChange: (data) => {
        console.log('[Gamepad] Navigation mode:', data.active ? 'ACTIVE' : 'INACTIVE');
        updateGamepadStatusIndicator();
        ipcRenderer.send('gamepad-navigation-state', { active: !!data.active });
        
        // While in controller navigation mode, disable click-through so focus/z-order is stable.
        // Main process restores click-through on exit only when it is safe.
        if (data.active) {
          ipcRenderer.send('set-ignore-mouse-events', false, { forward: true });
        } else if (!manualHotkeyPressed) {
          restoreOverlayPassThrough('gamepad-mode-inactive');
        }
      },
      
      onButtonPress: (data) => {
        // Forward all button presses to main process for potential custom handling
        ipcRenderer.send('gamepad-button', data);
      },
      
      onConfirm: (data) => {
        console.log('[Gamepad] Confirmed selection:', data.character);
        // The click event dispatched by GamepadHandler should trigger Yomitan
      },
      
      onCancel: () => {
        console.log('[Gamepad] Selection cancelled');
      },
      
      onConnectionChange: (data) => {
        console.log('[Gamepad] Server connection:', data.connected ? 'CONNECTED' : 'DISCONNECTED');
        updateGamepadStatusIndicator();
      },
    });

    window.gamepadHandler = gamepadHandler;
    updateGamepadStatusIndicator();

    if (shouldConnectGamepadServer()) {
      console.log('[Gamepad] Handler initialized - connecting to tokenizer/gamepad server at', gamepadSettings.serverUrl);
    } else {
      console.log('[Gamepad] Handler initialized without controller server connection (furigana-only mode)');
    }
  }

  async function syncGamepadHandlerLifecycle() {
    if (!shouldUseGamepadHandler()) {
      if (gamepadHandler) {
        gamepadHandler.destroy();
        gamepadHandler = null;
      }
      window.gamepadHandler = null;
      updateGamepadStatusIndicator();
      return;
    }

    if (!gamepadHandler) {
      await initGamepad();
      return;
    }

    gamepadHandler.updateConfig(getGamepadHandlerConfig());
    if (!gamepadSettings.enabled && typeof gamepadHandler.manualDeactivate === 'function') {
      gamepadHandler.manualDeactivate();
    }
    if (typeof gamepadHandler.setTokenMode === 'function') {
      gamepadHandler.setTokenMode(gamepadSettings.tokenMode);
    }
    window.gamepadHandler = gamepadHandler;
    updateGamepadStatusIndicator();
  }
  
  // Update gamepad status indicator
  function updateGamepadStatusIndicator() {
    const statusEl = document.getElementById('gamepad-status');
    if (!statusEl) return;

    if (gamepadStatusHideTimeout) {
      clearTimeout(gamepadStatusHideTimeout);
      gamepadStatusHideTimeout = null;
    }

    if (!gamepadSettings.enabled || !gamepadHandler) {
      wasGamepadConnected = false;
      statusEl.classList.remove('connected', 'server-connected', 'active');
      statusEl.style.display = 'none';
      return;
    }
    
    const state = gamepadHandler.getCurrentState();
    const navigationAvailability = getGamepadNavigationAvailability();
    const navigationAvailable = navigationAvailability.controller || navigationAvailability.keyboard;
    const serverConnected = gamepadHandler.isServerConnected();
    const gamepadConnected = gamepadHandler.isGamepadConnected();
    const justConnected = !wasGamepadConnected && gamepadConnected;
    wasGamepadConnected = gamepadConnected;

    statusEl.classList.toggle('connected', serverConnected && gamepadConnected);
    statusEl.classList.toggle('server-connected', serverConnected);
    statusEl.classList.toggle('active', state.isActive);
    
    if (
      !state.isActive &&
      (
        !navigationAvailable ||
        !serverConnected ||
        (navigationAvailability.controller && !gamepadConnected)
      )
    ) {
      statusEl.style.display = 'none';
    } else if (state.isActive) {
      const modeLabel = state.tokenMode && state.totalTokens > 0 ? 'Token' : 'Char';
      const totalUnits = state.tokenMode && state.totalTokens > 0 ? state.totalTokens : state.totalCharacters;
      statusEl.textContent = `🎮 Navigation: Block ${state.currentBlockIndex + 1}/${state.totalBlocks} | ${modeLabel} ${state.currentCursorIndex + 1}/${totalUnits}`;
      statusEl.style.display = 'block';
      statusEl.style.color = '#00ff88';
    } else {
      const readyMessage = navigationAvailability.controller
        ? '🎮 Controller ready (hold LB + D-Pad to navigate)'
        : '🎮 Navigation ready';
      statusEl.textContent = readyMessage;
      statusEl.style.display = justConnected ? 'block' : 'none';
      statusEl.style.color = '#00ff88';
      if (justConnected) {
        gamepadStatusHideTimeout = setTimeout(() => {
          if (gamepadHandler && !gamepadHandler.getCurrentState().isActive) {
            const el = document.getElementById('gamepad-status');
            if (el && !el.classList.contains('active')) {
              el.style.display = 'none';
            }
          }
        }, 5000);
      }
    }
  }
  
  // Listen for server connection events
  window.addEventListener('gsm-gamepad-server-connected', () => {
    console.log('[Gamepad] Server connected');
    updateGamepadStatusIndicator();
  });
  
  window.addEventListener('gsm-gamepad-server-disconnected', () => {
    console.log('[Gamepad] Server disconnected');
    updateGamepadStatusIndicator();
  });
  
  // Listen for gamepad connection events
  window.addEventListener('gsm-gamepad-connected', (e) => {
    console.log('[Gamepad] Controller connected:', e.detail.device);
    updateGamepadStatusIndicator();
    ipcRenderer.send('gamepad-connected', e.detail);
  });
  
  window.addEventListener('gsm-gamepad-disconnected', (e) => {
    console.log('[Gamepad] Controller disconnected:', e.detail.device);
    updateGamepadStatusIndicator();
    ipcRenderer.send('gamepad-disconnected', e.detail);
  });
  
  // Listen for navigation activation
  window.addEventListener('gsm-gamepad-navigation-active', (e) => {
    updateGamepadStatusIndicator();
  });
  
  // Listen for cursor position changes (for debugging/visualization)
  window.addEventListener('gsm-gamepad-cursor-position', (e) => {
    // This event fires whenever the gamepad moves the cursor
    // The GamepadHandler already handles positioning, but we can add
    // additional logic here if needed
  });
  
  // IPC: Receive gamepad settings from main process
  ipcRenderer.on('gamepad-settings', (event, settings) => {
    console.log('[Gamepad] Settings received:', settings);
    gamepadSettings = { ...gamepadSettings, ...settings };

    void syncGamepadHandlerLifecycle();
  });
  
  // IPC: Toggle gamepad navigation mode (can be triggered by hotkey from main)
  ipcRenderer.on('gamepad-toggle-navigation', () => {
    if (gamepadHandler && gamepadSettings.enabled) {
      gamepadHandler.manualToggle();
    }
  });

  // IPC: Temporarily suppress gamepad handling while settings input test runs.
  ipcRenderer.on('gamepad-input-test-active', (event, payload) => {
    const active = !!(payload && payload.active);
    gamepadInputSuppressed = active;
    gamepadSettings.inputSuppressed = active;
    if (gamepadHandler) {
      if (typeof gamepadHandler.setInputSuppressed === 'function') {
        gamepadHandler.setInputSuppressed(active);
      } else {
        gamepadHandler.updateConfig({ inputSuppressed: active });
      }
      updateGamepadStatusIndicator();
    }
  });
  
  // IPC: Manual navigation commands (can be bound to keyboard in main)
  ipcRenderer.on('gamepad-navigate', (event, direction) => {
    if (!gamepadHandler || !gamepadSettings.enabled) return;
    
    switch (direction) {
      case 'up':
        gamepadHandler.manualBlockUp();
        break;
      case 'down':
        gamepadHandler.manualBlockDown();
        break;
      case 'left':
        gamepadHandler.manualCursorLeft();
        break;
      case 'right':
        gamepadHandler.manualCursorRight();
        break;
      case 'activate':
        gamepadHandler.manualActivate();
        break;
      case 'deactivate':
        gamepadHandler.manualDeactivate();
        break;
    }
    
    updateGamepadStatusIndicator();
  });
  
  // Listen for token mode changes and save to settings
  window.addEventListener('gsm-gamepad-token-mode-changed', (e) => {
    console.log('[Gamepad] Token mode changed:', e.detail.tokenMode);
    gamepadSettings.tokenMode = e.detail.tokenMode;
    // Save to persistent settings via IPC
    ipcRenderer.send('save-settings', { gamepadTokenMode: e.detail.tokenMode });
    updateGamepadStatusIndicator();
  });
  
  // Initialize gamepad after DOM is ready
  // NOTE: Don't initialize immediately - wait for settings to be loaded first
  // Settings are sent via 'load-settings' event after window is ready
  // if (document.readyState === 'loading') {
  //   document.addEventListener('DOMContentLoaded', initGamepad);
  // } else {
  //   initGamepad();
  // }
  
  // Re-initialize when settings change
  ipcRenderer.on('settings-updated', (event, updatedSettings) => {
    let needsLifecycleSync = false;
    
    // Handle server URL change
    if (updatedSettings.gamepadServerPort !== undefined) {
      gamepadSettings.serverUrl = `ws://localhost:${updatedSettings.gamepadServerPort}`;
      needsLifecycleSync = true;
    }
    
    if (updatedSettings.gamepadEnabled !== undefined) {
      gamepadSettings.enabled = updatedSettings.gamepadEnabled;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadActivationMode !== undefined) {
      gamepadSettings.activationMode = updatedSettings.gamepadActivationMode;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadModifierButton !== undefined) {
      gamepadSettings.modifierButton = updatedSettings.gamepadModifierButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadToggleButton !== undefined) {
      gamepadSettings.toggleButton = updatedSettings.gamepadToggleButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadConfirmButton !== undefined) {
      gamepadSettings.confirmButton = updatedSettings.gamepadConfirmButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadCancelButton !== undefined) {
      gamepadSettings.cancelButton = updatedSettings.gamepadCancelButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadForwardEnterButton !== undefined) {
      gamepadSettings.forwardEnterButton = updatedSettings.gamepadForwardEnterButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadManualOverlayScanButton !== undefined) {
      gamepadSettings.manualOverlayScanButton = updatedSettings.gamepadManualOverlayScanButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadNextEntryButton !== undefined) {
      gamepadSettings.nextEntryButton = updatedSettings.gamepadNextEntryButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadPrevEntryButton !== undefined) {
      gamepadSettings.prevEntryButton = updatedSettings.gamepadPrevEntryButton;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadTokenMode !== undefined) {
      gamepadSettings.tokenMode = updatedSettings.gamepadTokenMode;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadTokenizerBackend !== undefined) {
      gamepadSettings.tokenizerBackend = updatedSettings.gamepadTokenizerBackend;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadLocalTokenizerFallbackBackend !== undefined) {
      gamepadSettings.localTokenizerFallbackBackend = updatedSettings.gamepadLocalTokenizerFallbackBackend;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadYomitanApiUrl !== undefined) {
      gamepadSettings.yomitanApiUrl = updatedSettings.gamepadYomitanApiUrl;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadYomitanScanLength !== undefined) {
      gamepadSettings.yomitanScanLength = updatedSettings.gamepadYomitanScanLength;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadJitenApiKey !== undefined) {
      gamepadSettings.jitenApiKey = updatedSettings.gamepadJitenApiKey;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadJpdbApiKey !== undefined) {
      gamepadSettings.jpdbApiKey = updatedSettings.gamepadJpdbApiKey;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadControllerEnabled !== undefined) {
      gamepadSettings.controllerEnabled = updatedSettings.gamepadControllerEnabled;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadKeyboardEnabled !== undefined) {
      gamepadSettings.keyboardEnabled = updatedSettings.gamepadKeyboardEnabled;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadRepeatDelay !== undefined) {
      gamepadSettings.repeatDelay = updatedSettings.gamepadRepeatDelay;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadRepeatRate !== undefined) {
      gamepadSettings.repeatRate = updatedSettings.gamepadRepeatRate;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadAutoConfirmSelection !== undefined) {
      gamepadSettings.autoConfirmSelection = updatedSettings.gamepadAutoConfirmSelection;
      needsLifecycleSync = true;
    }
    if (updatedSettings.gamepadFocusOverlayOnEntry !== undefined) {
      gamepadSettings.focusOverlayOnEntry = updatedSettings.gamepadFocusOverlayOnEntry;
      needsLifecycleSync = true;
    }
    if (updatedSettings.showFurigana !== undefined) {
      needsLifecycleSync = true;
    }
    // Handle keyboard binding settings
    for (const key of KEYBOARD_SETTING_KEYS) {
      if (updatedSettings[key] !== undefined) {
        gamepadSettings[key] = updatedSettings[key];
        needsLifecycleSync = true;
      }
    }
    
    if (needsLifecycleSync) {
      void syncGamepadHandlerLifecycle();
    }
  });
  
  // Expose for debugging
  window.getGamepadState = () => gamepadHandler ? gamepadHandler.getCurrentState() : null;
  window.gamepadHandler = gamepadHandler;
</script>

</html>
