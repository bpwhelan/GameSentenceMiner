name: Build Electron App for Development Release

on:
  push:
    branches:
      - develop
      - unify-electron-runtimes
  workflow_dispatch:

concurrency:
  group: dev-release-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      PACKAGE_VERSION: ${{ steps.version.outputs.PACKAGE_VERSION }}
      release_body: ${{ steps.release_body.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Compute next pre-release version
        id: version
        run: |
          VERSION=$(node scripts/compute-version.cjs --pre-release --preid beta)
          echo "Computed pre-release version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Render prerelease body
        id: release_body
        run: |
          {
            echo "release_body<<EOF"
            node scripts/render-release-body.mjs --mode prerelease --version "${{ steps.version.outputs.PACKAGE_VERSION }}" --repo "${{ github.repository }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs:
      - compute-version

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (Windows)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          New-Item -ItemType Directory -Force -Path GSM_Overlay/input_server/bin/win32 | Out-Null
          Copy-Item GSM_Overlay/input_server/target/release/gsm_overlay_server.exe GSM_Overlay/input_server/bin/win32/gsm_overlay_server.exe -Force

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Convert Handlebar files to LF
        run: |
          Get-ChildItem -Path ./GSM_Overlay/yomitan/data/templates -Recurse -Include *.handlebars | ForEach-Object {
            $c = (Get-Content $_.FullName -Raw) -replace "`r`n", "`n"
            Set-Content $_.FullName $c -NoNewline
          }

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload unsigned Windows installer for SignPath
        id: upload-unsigned-windows
        uses: actions/upload-artifact@v4
        with:
          name: signpath-dev-windows-${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          path: dist/*Setup*.exe
          if-no-files-found: error

      - name: Upload unsigned unpacked Windows build for SignPath
        id: upload-unsigned-windows-unpacked
        uses: actions/upload-artifact@v4
        with:
          name: signpath-dev-windows-unpacked-${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          path: dist/win-unpacked
          if-no-files-found: error

      - name: Submit Windows signing request
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_APITOKEN }}
          organization-id: c677c167-9f3e-4577-b967-5d7730bf742d
          project-slug: GameSentenceMiner
          signing-policy-slug: test-signing
          github-artifact-id: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed_windows

      - name: Submit unpacked Windows signing request
        id: sign-windows-unpacked
        uses: signpath/github-action-submit-signing-request@b9d91eadd323de506c0c81cf0c7fe7438f3360fd
        with:
          api-token: ${{ secrets.SIGNPATH_APITOKEN }}
          organization-id: c677c167-9f3e-4577-b967-5d7730bf742d
          project-slug: GameSentenceMiner
          signing-policy-slug: test-signing
          artifact-configuration-slug: Unpacked_GSM
          github-artifact-id: ${{ steps.upload-unsigned-windows-unpacked.outputs.artifact-id }}
          wait-for-completion: true

      - name: Replace installer with signed copy and recreate update metadata
        shell: pwsh
        run: |
          $distRoot = (Resolve-Path "dist").Path
          $artifactRoot = (Resolve-Path "signed_windows").Path

          $distExe = Get-ChildItem -Path $distRoot -File -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $distExe) {
            throw "No unsigned installer found in dist."
          }

          $signedExe = Get-ChildItem -Path $artifactRoot -Recurse -File -Filter $distExe.Name | Select-Object -First 1
          if (-not $signedExe) {
            $signedExe = Get-ChildItem -Path $artifactRoot -Recurse -File -Filter "*Setup*.exe" | Select-Object -First 1
          }
          if (-not $signedExe) {
            throw "No signed installer found in signed_windows."
          }

          if ($signedExe.Name -ne $distExe.Name) {
            throw "Signed installer name '$($signedExe.Name)' does not match expected '$($distExe.Name)'."
          }

          Copy-Item -Path $signedExe.FullName -Destination $distExe.FullName -Force

          $appBuilder = node -e "process.stdout.write(require('app-builder-bin').appBuilderPath)"
          if (-not $appBuilder) {
            throw "Unable to resolve app-builder path."
          }

          $blockmapOutput = "$($distExe.FullName).blockmap"
          $blockmapJson = & $appBuilder blockmap --input "$($distExe.FullName)" --output "$blockmapOutput"
          if ($LASTEXITCODE -ne 0) {
            throw "app-builder failed to generate blockmap."
          }
          $blockmapInfo = $blockmapJson | ConvertFrom-Json

          $packageVersion = (Get-Content -Raw -Path "./package.json" | ConvertFrom-Json).version
          if (-not $packageVersion) {
            throw "Unable to read version from package.json."
          }

          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          $latestYml = @(
            "version: $packageVersion",
            "files:",
            "  - url: $($distExe.Name)",
            "    sha512: $($blockmapInfo.sha512)",
            "    size: $($blockmapInfo.size)",
            "path: $($distExe.Name)",
            "sha512: $($blockmapInfo.sha512)",
            "releaseDate: '$releaseDate'"
          ) -join "`n"
          Set-Content -Path (Join-Path $distRoot "latest.yml") -Value $latestYml -Encoding utf8NoBOM

      - name: Download signed unpacked Windows build
        shell: pwsh
        env:
          SIGNPATH_APITOKEN: ${{ secrets.SIGNPATH_APITOKEN }}
        run: |
          $packageVersion = (Get-Content -Raw -Path "./package.json" | ConvertFrom-Json).version
          if (-not $packageVersion) {
            throw "Unable to read version from package.json."
          }
          if (-not $env:SIGNPATH_APITOKEN) {
            throw "SIGNPATH_APITOKEN secret is not available."
          }

          $zipPath = Join-Path (Resolve-Path "dist").Path "GameSentenceMiner-$packageVersion-win-unpacked.zip"
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          $headers = @{
            Authorization = "Bearer $env:SIGNPATH_APITOKEN"
          }
          Invoke-WebRequest -Uri "${{ steps.sign-windows-unpacked.outputs.signed-artifact-download-url }}" -Headers $headers -OutFile $zipPath
          if (-not (Test-Path $zipPath)) {
            throw "Failed to download signed unpacked Windows zip."
          }

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          name: Pre-Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          body: ${{ needs.compute-version.outputs.release_body }}
          prerelease: true
          overwrite_files: true
          files: |
            dist/*Setup*.exe
            dist/GameSentenceMiner-*-win-unpacked.zip
            dist/latest.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - compute-version

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Install Linux native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libudev-dev \
            libx11-dev \
            libxtst-dev

      - name: Build gamepad server (Linux)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/linux
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/linux/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/linux/gsm_overlay_server

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app (Linux)
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          name: Pre-Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          body: ${{ needs.compute-version.outputs.release_body }}
          prerelease: true
          overwrite_files: true
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac-arm64:
    runs-on: macos-15
    needs:
      - compute-version

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (macOS)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/darwin
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/darwin/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/darwin/gsm_overlay_server

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app (macOS arm64)
        run: npm run app:dist -- --mac --arm64 -c.mac.artifactName='${productName}-${version}-${arch}.${ext}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy arm64 update manifest
        run: cp dist/latest-mac.yml dist/latest-mac-arm64.yml

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          name: Pre-Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          body: ${{ needs.compute-version.outputs.release_body }}
          prerelease: true
          overwrite_files: true
          files: |
            dist/*-arm64.dmg
            dist/latest-mac.yml
            dist/latest-mac-arm64.yml
            dist/*-arm64.dmg.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trim-prereleases:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
      - build-mac-arm64
    steps:
      - name: Keep only 2 newest prereleases beyond latest stable
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function parseVersionParts(version) {
              if (!/^\d+(?:\.\d+)*$/.test(version || '')) return null;
              return version.split('.').map((segment) => Number(segment));
            }

            function parseStable(tag) {
              const m = /^v(\d+(?:\.\d+)*)$/.exec(tag || '');
              if (!m) return null;
              const parts = parseVersionParts(m[1]);
              if (!parts) return null;
              return { parts };
            }

            function parsePre(tag) {
              const m = /^v(\d+(?:\.\d+)*)-([0-9a-z-]+)\.(\d+)$/.exec(tag || '');
              if (!m) return null;
              const parts = parseVersionParts(m[1]);
              if (!parts) return null;
              return {
                parts,
                preId: m[2],
                preN: Number(m[3]),
              };
            }

            function compareBase(a, b) {
              const maxLength = Math.max(a.parts.length, b.parts.length);
              for (let i = 0; i < maxLength; i += 1) {
                const left = a.parts[i] ?? 0;
                const right = b.parts[i] ?? 0;
                if (left !== right) return left - right;
              }
              return 0;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const stable = releases
              .filter((r) => !r.draft && !r.prerelease)
              .map((r) => ({ release: r, parsed: parseStable(r.tag_name) }))
              .filter((x) => x.parsed);

            stable.sort((a, b) => compareBase(b.parsed, a.parsed));
            const latestStable = stable.length ? stable[0].parsed : null;

            const preCandidates = releases
              .filter((r) => !r.draft && r.prerelease)
              .map((r) => ({ release: r, parsed: parsePre(r.tag_name) }))
              .filter((x) => x.parsed)
              .filter((x) => !latestStable || compareBase(x.parsed, latestStable) > 0);

            if (preCandidates.length <= 2) {
              core.info(`No cleanup needed. Matching prereleases: ${preCandidates.length}`);
              return;
            }

            preCandidates.sort((a, b) => {
              const aDate = Date.parse(a.release.published_at || a.release.created_at || '');
              const bDate = Date.parse(b.release.published_at || b.release.created_at || '');
              return bDate - aDate;
            });

            const keep = preCandidates.slice(0, 2).map((x) => x.release);
            core.info(
              `Keeping prereleases: ${keep.map((r) => `${r.tag_name} (${r.id})`).join(', ')}`
            );

            for (const item of preCandidates.slice(2)) {
              const r = item.release;
              core.info(`Deleting old prerelease ${r.tag_name} (${r.id})`);
              await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${r.tag_name}` });
              } catch (e) {
                core.warning(`Failed to delete tag ${r.tag_name}: ${e.message}`);
              }
            }
