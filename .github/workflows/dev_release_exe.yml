name: Build Electron App for Development Release

on:
  push:
    branches:
      - develop
      - overlay-controller
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      PACKAGE_VERSION: ${{ steps.version.outputs.PACKAGE_VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute next pre-release version
        id: version
        run: |
          $VERSION = node scripts/compute-version.cjs --pre-release --preid beta
          echo "Computed pre-release version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Stamp version into package.json
        run: npm version ${{ steps.version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (Windows)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          New-Item -ItemType Directory -Force -Path GSM_Overlay/input_server/bin/win32 | Out-Null
          Copy-Item GSM_Overlay/input_server/target/release/gsm_overlay_server.exe GSM_Overlay/input_server/bin/win32/gsm_overlay_server.exe -Force

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Convert Handlebar files to LF
        run: |
          Get-ChildItem -Path ./GSM_Overlay/yomitan/data/templates -Recurse -Include *.handlebars | ForEach-Object {
            $c = (Get-Content $_.FullName -Raw) -replace "`r`n", "`n"
            Set-Content $_.FullName $c -NoNewline
          }

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm install
          npm run package

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: |
          npm run build
          npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-unpacked
          path: dist/win-unpacked/**

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

      - name: Create and upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.PACKAGE_VERSION }}
          name: Pre-Release v${{ steps.version.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: true
          files: |
            dist/*Setup*.exe
            dist/latest.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stamp version into package.json
        run: npm version ${{ needs.build-windows.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Install libudev (Linux)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build gamepad server (Linux)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/linux
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/linux/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/linux/gsm_overlay_server

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm install
          npm run package

      - name: Install dependencies
        run: |
          npm install
          npm install --save-dev electron electron-builder

      - name: Build Electron app (Linux)
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: dist/*.AppImage

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.PACKAGE_VERSION }}
          prerelease: true
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs: build-windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stamp version into package.json
        run: npm version ${{ needs.build-windows.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (macOS)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/darwin
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/darwin/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/darwin/gsm_overlay_server

      - name: Write prerelease metadata
        run: |
          node -e "const fs=require('fs');const path=require('path');const branch=(process.env.GITHUB_HEAD_REF||process.env.GITHUB_REF_NAME||'unknown').trim()||'unknown';const payload={branch,generatedAt:new Date().toISOString()};const out=path.join('electron-src','assets','prerelease.json');fs.writeFileSync(out, JSON.stringify(payload, null, 2)+'\n');console.log('Wrote prerelease metadata to', out, 'for branch', branch);"

      - name: Build Overlay
        working-directory: GSM_Overlay
        run: |
          npm install
          npm run package

      - name: Install dependencies
        run: |
          npm install
          npm install --save-dev electron electron-builder

      - name: Build Electron app (macOS)
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

      - name: Upload to pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-windows.outputs.PACKAGE_VERSION }}
          prerelease: true
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
