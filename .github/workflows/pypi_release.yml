name: Build and Publish Python Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # Full history needed for tag-based versioning

      # ── Compute next CalVer version from git tags ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Compute version
        id: compute_version
        run: |
          VERSION=$(node scripts/compute-version.cjs)
          echo "Computed version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Python build & publish ──
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Stamp version into pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ steps.compute_version.outputs.version }}"/' pyproject.toml
          echo "Stamped version:"
          grep '^version' pyproject.toml

      - name: Install build and publish dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel twine build

      - name: Build the package
        run: |
          python -m build

      - name: Generate strict runtime lock assets
        run: |
          python -m pip install uv==0.9.22
          uv lock
          python scripts/generate_runtime_lock_manifest.py --lock uv.lock --pyproject pyproject.toml --output runtime-lock-manifest.json --uv-version 0.9.22
          mkdir -p runtime-lock
          cp uv.lock runtime-lock/uv.lock
          cp runtime-lock-manifest.json runtime-lock/runtime-lock-manifest.json
          for alias in \
            uv-win32-x64.lock \
            uv-windows-x64.lock \
            uv-win32-arm64.lock \
            uv-windows-arm64.lock \
            uv-linux-x64.lock \
            uv-linux-arm64.lock \
            uv-macos-x64.lock \
            uv-macos-arm64.lock \
            uv-darwin-x64.lock \
            uv-darwin-arm64.lock; do
            cp uv.lock "runtime-lock/$alias"
          done
          cp pyproject.toml runtime-lock/pyproject.toml

      - name: Publish package to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Publish lock assets to GitHub release tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.compute_version.outputs.version }}
          name: Python Backend v${{ steps.compute_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            runtime-lock/*.lock
            runtime-lock/pyproject.toml
            runtime-lock/runtime-lock-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
