name: Build and Publish Python Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install check dependencies
        run: |
          python -m pip install --upgrade pip requests

      - name: Read package metadata from pyproject.toml
        id: package_meta
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as f:
              project = tomllib.load(f)["project"]

          package_name = project["name"]
          package_version = project["version"]

          print(f"Package: {package_name}")
          print(f"Version: {package_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"package_name={package_name}\n")
              out.write(f"package_version={package_version}\n")
          PY

      - name: Check if version exists on PyPI
        id: check_version
        run: |
          python - <<'PY'
          import os
          import requests

          package_name = "${{ steps.package_meta.outputs.package_name }}"
          version = "${{ steps.package_meta.outputs.package_version }}"
          url = f"https://pypi.org/pypi/{package_name}/{version}/json"

          print(f"Checking Package: {package_name}")
          print(f"Checking Version: {version}")
          print(f"Checking URL: {url}")

          should_publish = "true"

          try:
              response = requests.get(url, timeout=30)
              if response.status_code == 404:
                  print(f"Version {version} not found on PyPI. Proceeding.")
              elif response.status_code == 200:
                  print(f"Version {version} already exists on PyPI. Skipping publish.")
                  should_publish = "false"
              else:
                  print(f"Unexpected PyPI response: {response.status_code}")
                  print("Proceeding with publish attempt.")
          except Exception as exc:
              print(f"Version check failed: {exc}")
              print("Proceeding with publish attempt.")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"should_publish={should_publish}\n")
          PY

      - name: Install build and publish dependencies
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade setuptools wheel twine build

      - name: Build the package
        if: steps.check_version.outputs.should_publish == 'true'
        run: |
          python -m build

      - name: Publish package to PyPI
        if: steps.check_version.outputs.should_publish == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

      - name: Report skipped publish
        if: steps.check_version.outputs.should_publish == 'false'
        run: |
          echo "Publish skipped because version ${{ steps.package_meta.outputs.package_version }} already exists on PyPI."
