name: Build Electron App

on:
  workflow_dispatch:

concurrency:
  group: release-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: none
  actions: read
  pull-requests: none
  issues: none

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      PACKAGE_VERSION: ${{ steps.compute_version.outputs.PACKAGE_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Compute next version
        id: compute_version
        run: |
          VERSION=$(node scripts/compute-version.cjs)
          echo "Computed version: $VERSION"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs:
      - compute-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (Windows)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          New-Item -ItemType Directory -Force -Path GSM_Overlay/input_server/bin/win32 | Out-Null
          Copy-Item GSM_Overlay/input_server/target/release/gsm_overlay_server.exe GSM_Overlay/input_server/bin/win32/gsm_overlay_server.exe -Force

      - name: Convert Handlebar files to LF line endings
        run: |
          Get-ChildItem -Path ./GSM_Overlay/yomitan/data/templates -Recurse -Include *.handlebars | ForEach-Object {
            $content = (Get-Content $_.FullName -Raw) -replace "`r`n", "`n"
            Set-Content $_.FullName $content -NoNewline
          }

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*Setup*.exe
            dist/latest.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - compute-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Install libudev (Linux)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build gamepad server (Linux)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/linux
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/linux/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/linux/gsm_overlay_server

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app for Linux
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
            dist/*.AppImage.zsync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs:
      - compute-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Stamp version into package.json
        run: npm version ${{ needs.compute-version.outputs.PACKAGE_VERSION }} --no-git-tag-version --allow-same-version

      - name: Build gamepad server (macOS)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/darwin
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/darwin/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/darwin/gsm_overlay_server

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app for macOS
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.compute-version.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*.dmg
            dist/latest-mac.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
