name: Build Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-exe-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: none
  actions: read
  pull-requests: none
  issues: none

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.version_check.outputs.should_build }}
      PACKAGE_VERSION: ${{ steps.version_check.outputs.PACKAGE_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check package.json version against existing release
        id: version_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching version from package.json..."
          PACKAGE_VERSION=$(jq -r .version < ./package.json)
          if [ -z "$PACKAGE_VERSION" ] || [ "$PACKAGE_VERSION" = "null" ]; then
            echo "Error: Could not extract version from package.json"
            exit 1
          fi

          echo "Package Version: $PACKAGE_VERSION"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          echo "Checking if release tag v$PACKAGE_VERSION exists..."
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$PACKAGE_VERSION")

          if [ "$RESPONSE_CODE" = "200" ]; then
            echo "Release tag v$PACKAGE_VERSION exists. Skipping build and upload."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          elif [ "$RESPONSE_CODE" = "404" ]; then
            echo "Release tag v$PACKAGE_VERSION does not exist. Proceeding with build and release."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Error: Unexpected response while checking releases: $RESPONSE_CODE"
            exit 1
          fi

  create-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    if: needs.prepare-release.outputs.should_build == 'true'
    steps:
      - name: Create release shell
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          append_body: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs:
      - prepare-release
      - create-release
    if: needs.prepare-release.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Build gamepad server (Windows)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          New-Item -ItemType Directory -Force -Path GSM_Overlay/input_server/bin/win32 | Out-Null
          Copy-Item GSM_Overlay/input_server/target/release/gsm_overlay_server.exe GSM_Overlay/input_server/bin/win32/gsm_overlay_server.exe -Force

      - name: Convert Handlebar files to LF line endings
        run: |
          Get-ChildItem -Path ./GSM_Overlay/yomitan/data/templates -Recurse -Include *.handlebars | ForEach-Object {
            $content = (Get-Content $_.FullName -Raw) -replace "`r`n", "`n"
            Set-Content $_.FullName $content -NoNewline
          }

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*Setup*.exe
            dist/latest.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - create-release
    if: needs.prepare-release.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install libudev (Linux)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build gamepad server (Linux)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/linux
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/linux/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/linux/gsm_overlay_server

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app for Linux
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
            dist/*.AppImage.zsync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    needs:
      - prepare-release
      - create-release
    if: needs.prepare-release.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            GSM_Overlay/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            GSM_Overlay/input_server -> GSM_Overlay/input_server/target

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'GSM_Overlay/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Build gamepad server (macOS)
        run: |
          cargo build --release --manifest-path GSM_Overlay/input_server/Cargo.toml
          mkdir -p GSM_Overlay/input_server/bin/darwin
          cp GSM_Overlay/input_server/target/release/gsm_overlay_server GSM_Overlay/input_server/bin/darwin/gsm_overlay_server
          chmod +x GSM_Overlay/input_server/bin/darwin/gsm_overlay_server

      - name: Build Overlay
        working-directory: ./GSM_Overlay
        run: |
          npm ci --prefer-offline --no-audit --fund=false
          npm run package

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build Electron app for macOS
        run: npm run app:dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.prepare-release.outputs.PACKAGE_VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          files: |
            dist/*.dmg
            dist/latest-mac.yml
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  report-skipped-build:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    if: needs.prepare-release.outputs.should_build == 'false'
    steps:
      - name: Report skipped build
        run: |
          echo "Build and upload skipped because release for package.json version already exists."
